name: Chrome Web Store Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to the Chrome Web Store after packaging
        required: false
        default: false
        type: boolean
  push:
    branches:
      - master

concurrency:
  group: chrome-web-store-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      archive: ${{ steps.archive.outputs.path }}
      version_changed: ${{ steps.version_check.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read manifest version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether manifest version changed
        id: version_check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e HEAD^:manifest.json 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous=$(git show HEAD^:manifest.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          current="${{ steps.version.outputs.version }}"

          if [ "$previous" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest version did not change ($current). Publish will be skipped."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manifest version changed: $previous -> $current"
          fi

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="${{ steps.version.outputs.version }}"

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag version $tag_version does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Build extension archive
        id: archive
        shell: bash
        run: |
          mkdir -p dist
          archive="chatgpt-history-blur-${{ steps.version.outputs.version }}.zip"
          zip -r "dist/$archive" \
            manifest.json \
            content.js \
            popup.html \
            popup.js \
            storage.js \
            _locales \
            icons
          echo "path=dist/$archive" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ steps.version.outputs.version }}
          path: ${{ steps.archive.outputs.path }}

  publish:
    needs: package
    if: (github.event_name == 'push' && needs.package.outputs.version_changed == 'true') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build extension archive
        shell: bash
        run: |
          mkdir -p dist
          zip -r "${{ needs.package.outputs.archive }}" \
            manifest.json \
            content.js \
            popup.html \
            popup.js \
            storage.js \
            _locales \
            icons

      - name: Publish to Chrome Web Store
        uses: browser-actions/release-chrome-extension@v0.2.1
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          extension-path: ${{ needs.package.outputs.archive }}
          oauth-client-id: ${{ secrets.CHROME_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  skipped:
    needs: package
    if: github.event_name == 'push' && needs.package.outputs.version_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish when version unchanged
        run: echo "Skipping Chrome Web Store publish because manifest version did not change."